services:
  health-facilities-tracker-db:
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD_TEST:-root_password}
      MYSQL_USER: ${DB_USER_TEST:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD_TEST:-user_password}
      MYSQL_DATABASE: ${DB_NAME_TEST:-health-facilities-tracker_db}

    ports:
      - ${DB_PORT_TEST:-3307}:3306

    volumes:
      - health-facilities-tracker-db-test-data:/var/lib/mysql

  health-facilities-tracker-redis:
    ports:
        - ${REDIS_PORT_TEST:-6380}:6379
    volumes:
      - health-facilities-tracker-redis-test-data:/data

  health-facilities-tracker-rabbitmq:
    container_name: health-facilities-tracker-rabbitmq
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - ${RABBITMQ_PORT:-5672}:5672
      - ${RABBITMQ_MANAGEMENT_PORT:-15672}:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - health-facilities-tracker-rabbitmq-data:/var/lib/rabbitmq

volumes:
  health-facilities-tracker-db-test-data:
  health-facilities-tracker-redis-test-data:
  health-facilities-tracker-rabbitmq-data:
